<!DOCTYPE html>
<html>
<head>
    <title>OAuth Test</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <h1>Google OAuth Test</h1>
    <div id="status">Loading...</div>
    <div id="g_id_onload"
         data-client_id="424357134168-036fatdul5hun7nqdk59j50pn5uijokd.apps.googleusercontent.com"
         data-callback="handleCredentialResponse">
    </div>
    <div class="g_id_signin" data-type="standard"></div>

    <script>
        function handleCredentialResponse(response) {
            console.log("Encoded JWT ID token: " + response.credential);
            document.getElementById('status').innerHTML = 'Got credential! Check console.';
            
            // Test backend
            fetch('http://localhost:5000/api/auth/google', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ credential: response.credential })
            })
            .then(res => res.json())
            .then(data => {
                console.log('Backend response:', data);
                document.getElementById('status').innerHTML = 'Success! Check console for details.';
            })
            .catch(err => {
                console.error('Error:', err);
                document.getElementById('status').innerHTML = 'Error! Check console.';
            });
        }
    </script>
</body>
</html>
